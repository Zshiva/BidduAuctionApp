#Wed Nov 01 15:37:30 GMT 2023
micronaut.application.name=bidduAuctionApp

# Security Configuration
micronaut.security.enabled=true
micronaut.security.authentication=bearer
micronaut.security.token.jwt.enabled=true
micronaut.security.token.jwt.header=Authorization
micronaut.security.token.jwt.prefix=Bearer

# JWT Secret Key (should be at least 256 bits for HS256)
# In production, use environment variables or secure vault
micronaut.security.token.jwt.claims.aud=biddu_auction_app
micronaut.security.token.jwt.generator.expiration=3600

